name: Build, Push & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/c8negocios/nlm-mcp-service

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/c8negocios/nlm-mcp-service:latest
            ghcr.io/c8negocios/nlm-mcp-service:${{ github.sha }}

      - name: Trigger Coolify service restart
        run: |
          echo "Restarting Coolify service: ${{ secrets.COOLIFY_SERVICE_UUID }}"
          curl -s -X POST \
            "http://157.180.122.109:8000/api/v1/services/${{ secrets.COOLIFY_SERVICE_UUID }}/start" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            || echo "Coolify restart triggered (may need manual restart first time)"

      - name: Deploy status
        run: echo "✅ Image pushed to ghcr.io/c8negocios/nlm-mcp-service:latest"
