name: Build, Push & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/c8negocios/nlm-mcp-service
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # evita warnings de Node 20 deprecated

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3

        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6     # v6 = mais recente (era v5)
        with:
          context: .
          push: true
          tags: |
            ghcr.io/c8negocios/nlm-mcp-service:latest
            ghcr.io/c8negocios/nlm-mcp-service:${{ github.sha }}

      - name: Trigger Coolify redeploy (pull latest image + restart)
        run: |
          echo "🚀 Triggering Coolify redeploy for service: ${{ secrets.COOLIFY_SERVICE_UUID }}"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "http://157.180.122.109:8000/api/v1/services/${{ secrets.COOLIFY_SERVICE_UUID }}/restart" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP $HTTP_CODE — $BODY"
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
            echo "⚠️ Coolify restart returned $HTTP_CODE — check manually"
          else
            echo "✅ Coolify redeploy queued successfully"
          fi

      - name: Deploy status
        run: echo "✅ Build done — ghcr.io/c8negocios/nlm-mcp-service:latest pushed + Coolify restart triggered"
