services:
  nlm-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nlm-service
    restart: unless-stopped
    environment:
      - NOTEBOOKLM_MCP_TRANSPORT=http
      - NOTEBOOKLM_MCP_PORT=8080
      - ADMIN_SECRET=${ADMIN_SECRET:-c8club-nlm-admin}
      - NOTEBOOKLM_HL=pt
    volumes:
      # Cookies e config persistem entre deploys e restarts
      - nlm_data:/root/.notebooklm-mcp-cli
    # Port 3000 = Admin UI → exposto publicamente via Traefik
    # Port 8080 = MCP server → interno apenas (sem label Traefik)
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      # Admin UI — porta 3000
      - "traefik.http.routers.nlm-admin.rule=Host(`nlm.codigooito.com.br`)"
      - "traefik.http.routers.nlm-admin.entrypoints=https"
      - "traefik.http.routers.nlm-admin.tls=true"
      - "traefik.http.routers.nlm-admin.tls.certresolver=letsencrypt"
      - "traefik.http.services.nlm-admin.loadbalancer.server.port=3000"
    networks:
      - coolify   # Rede global Coolify — acessível por todos os projetos
      - default

volumes:
  nlm_data:
    driver: local

networks:
  coolify:
    external: true

