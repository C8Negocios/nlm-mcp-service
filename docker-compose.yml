services:
  nlm-service:
    image: ghcr.io/c8negocios/nlm-mcp-service:latest
    pull_policy: always
    container_name: nlm-service
    restart: unless-stopped
    # Chrome/Chromium requires shared memory and unrestricted seccomp to run in Docker
    shm_size: '256m'
    security_opt:
      - seccomp:unconfined
    environment:
      - NOTEBOOKLM_MCP_TRANSPORT=http
      - NOTEBOOKLM_MCP_PORT=8080
      - ADMIN_SECRET=${ADMIN_SECRET:-c8club-nlm-admin}
      - NOTEBOOKLM_HL=pt
    volumes:
      - nlm_data:/root/.notebooklm-mcp-cli
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      # ── HTTPS (main) ──────────────────────────────────────────────
      - "traefik.http.routers.nlm-admin.rule=Host(`nlm.codigooito.com.br`)"
      - "traefik.http.routers.nlm-admin.entrypoints=https"
      - "traefik.http.routers.nlm-admin.tls=true"
      - "traefik.http.routers.nlm-admin.tls.certresolver=letsencrypt"
      - "traefik.http.services.nlm-admin.loadbalancer.server.port=3000"
      # ── HTTP → HTTPS redirect ─────────────────────────────────────
      - "traefik.http.routers.nlm-admin-http.rule=Host(`nlm.codigooito.com.br`)"
      - "traefik.http.routers.nlm-admin-http.entrypoints=http"
      - "traefik.http.routers.nlm-admin-http.middlewares=nlm-https-redirect"
      - "traefik.http.middlewares.nlm-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.nlm-https-redirect.redirectscheme.permanent=true"
    networks:
      - coolify
      - default

volumes:
  nlm_data:
    driver: local

networks:
  coolify:
    external: true
