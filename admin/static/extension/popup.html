<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px; font-family: -apple-system, 'Inter', sans-serif;
      background: #0a0f1e; color: #e2e8f0; padding: 0;
    }
    .header {
      background: linear-gradient(135deg, #0ea5e9, #7c3aed);
      padding: 16px 18px; display: flex; align-items: center; gap: 10px;
    }
    .header-icon { font-size: 22px; }
    .header-title { font-size: 14px; font-weight: 700; color: white; }
    .header-sub { font-size: 11px; color: rgba(255,255,255,0.7); margin-top: 1px; }
    .body { padding: 16px 18px; }
    .status-row {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px; padding: 10px 12px; margin-bottom: 14px;
    }
    .status-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
    .badge { font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 100px; }
    .badge.ok { background: rgba(16,185,129,0.15); color: #10b981; }
    .badge.no { background: rgba(239,68,68,0.1); color: #ef4444; }
    .site-warning {
      background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2);
      border-radius: 8px; padding: 10px 12px; margin-bottom: 14px;
      font-size: 12px; color: #f59e0b; display: none;
    }
    .btn {
      width: 100%; padding: 12px; border: none; border-radius: 10px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      background: linear-gradient(135deg, #0ea5e9, #7c3aed);
      color: white; transition: opacity 0.2s; margin-bottom: 8px;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg {
      text-align: center; font-size: 12px; color: #64748b;
      padding: 6px; min-height: 20px;
    }
    .msg.ok { color: #10b981; }
    .msg.err { color: #ef4444; }
    .secret-wrap { margin-bottom: 12px; }
    .secret-label { font-size: 11px; color: #64748b; margin-bottom: 5px; display: block; }
    .secret-input {
      width: 100%; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
      padding: 8px 10px; color: #e2e8f0; font-size: 13px; outline: none;
    }
    .secret-input:focus { border-color: rgba(14,165,233,0.4); }
    .footer { padding: 8px 18px 14px; font-size: 11px; color: #334155; text-align: center; }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-icon">📓</span>
    <div>
      <div class="header-title">NLM C8Club Auth</div>
      <div class="header-sub">Autenticação 1-clique</div>
    </div>
  </div>

  <div class="body">
    <div class="status-row">
      <span class="status-label">Status</span>
      <span class="badge no" id="badge">Verificando...</span>
    </div>

    <div class="site-warning" id="warning">
      ⚠️ Abra <strong>notebooklm.google.com</strong> e faça login antes de autenticar.
    </div>

    <div class="secret-wrap">
      <label class="secret-label" for="secret">Chave de acesso</label>
      <input type="password" id="secret" class="secret-input" placeholder="Digite a chave..." />
    </div>

    <button class="btn" id="authBtn" onclick="doAuth()">
      🔑 Autenticar agora
    </button>

    <div class="msg" id="msg"></div>
  </div>

  <div class="footer">C8Club · Infraestrutura de Plataforma</div>

  <script src="popup.js"></script>
</body>
</html>
